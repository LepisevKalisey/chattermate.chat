<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatterMate - Setup</title>
  <!-- Load Shopify App Bridge & Polaris dynamically only if in Shopify context to avoid console crashes in standalone mode -->
  <script>
    (function() {
      var urlParams = new URLSearchParams(window.location.search);
      var isShopify = urlParams.has('shop') || urlParams.has('host') || urlParams.has('hmac');
      if (isShopify) {
        var meta = document.createElement('meta');
        meta.name = 'shopify-api-key';
        meta.content = '<%= VITE_SHOPIFY_API_KEY %>';
        document.head.appendChild(meta);

        var scriptAB = document.createElement('script');
        scriptAB.src = 'https://cdn.shopify.com/shopifycloud/app-bridge.js';
        document.head.appendChild(scriptAB);

        var scriptPolaris = document.createElement('script');
        scriptPolaris.src = 'https://cdn.shopify.com/shopifycloud/polaris.js';
        document.head.appendChild(scriptPolaris);
      }
    })();
  </script>
</head>

<body>
  <div id="app"></div>
  <script src="/config.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
